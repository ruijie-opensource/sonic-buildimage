# 配置项：	PSU E2信息
# 填写说明：格式 other_i2c_dev_[main_dev]_[psu_index]
# 备注：	main_dev,PSU为2, psu_index:电源编号，从1开始
other_i2c_dev.bus_2_1=83
other_i2c_dev.addr_2_1=0x50
other_i2c_dev.bus_2_2=84
other_i2c_dev.addr_2_2=0x50
other_i2c_dev.bus_2_3=86
other_i2c_dev.addr_2_3=0x50
other_i2c_dev.bus_2_4=85
other_i2c_dev.addr_2_4=0x50

