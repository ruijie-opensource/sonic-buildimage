# Configuration items:	Address of psu pmbus sysfs
# Description: Format hwmon_psu_[psu_index]_[config_id]
# Note:	psu_index:Power supply number,start with 1 config_id 27:pmbus status reg
hwmon_psu.mode_1_27=config
hwmon_psu.int_cons_1_27=0
hwmon_psu.src_1_27=file
hwmon_psu.frmt_1_27=buf
hwmon_psu.fpath_1_27=/sys/bus/i2c/devices/24-0058/hwmon/
hwmon_psu.addr_1_27=0
hwmon_psu.len_1_27=16
hwmon_psu.bit_offset_1_27=
hwmon_psu.str_cons_1_27=status0

hwmon_psu.mode_2_27=config
hwmon_psu.int_cons_2_27=
