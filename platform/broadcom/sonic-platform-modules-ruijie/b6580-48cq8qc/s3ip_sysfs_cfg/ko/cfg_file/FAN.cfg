#
# @填写约定
# 1. 配置项之前必须填写完整注释，配置项同行禁止填写注释，配置项中间禁止添加无效空格
# 2. 配置项值支持10、16进制两种格式数值，16进制以"0x"开始
# 3. 配置项部分成员在特定产品中不需要填写，为方便其他产品拷贝填写，禁止删除
# 4. 配置项

# 配置项：	E2 i2c总线地址
# 填写说明：格式 other_i2c_dev.bus_[main_dev]_[dev_index] other_i2c_dev.addr_[main_dev]_[dev_index],
#			.bus配置项对应总线号(/dev/i2c-bus)
#			.addr配置项对应设备在总线上的地址
# 备注：	main_dev见rg_main_dev_type_t定义，主板为0, 风扇为1, dev_index设备索引
other_i2c_dev.bus_1_1=75
other_i2c_dev.addr_1_1=0x50
other_i2c_dev.bus_1_2=74
other_i2c_dev.addr_1_2=0x50
other_i2c_dev.bus_1_3=73
other_i2c_dev.addr_1_3=0x50
other_i2c_dev.bus_1_4=72
other_i2c_dev.addr_1_4=0x50
other_i2c_dev.bus_1_5=71
other_i2c_dev.addr_1_5=0x50
other_i2c_dev.bus_1_6=70
other_i2c_dev.addr_1_6=0x50

# 配置项：	风扇相关常量
# 填写说明：格式 dev_num_[main_dev]_[minor_dev]
# 备注：	main_dev,风扇为1, minor_dev, 0:不存在 5：马达

#风扇数量
dev_num_1_0=6

#马达数量
dev_num_1_5=2

# 配置项：	产品风扇E2格式
# 填写说明：格式fan_e2_mode
# 备注：	必填
fan_e2_mode=fru

# 配置项：	读取风扇E2的方式
# 填写说明：格式fan_sysfs_name
# 备注：	未配置则通过i2c读取，否则通过sysfs读取
fan_sysfs_name=eeprom

# 配置项：	风扇风道类型
# 填写说明：fan_direction_[direction]_[index]
# direction为风道类型0：F2B 1：B2F, index从1开始
# 备注：	必填
fan_direction_0_1=M6510-FAN-F
fan_direction_0_2=M2EFAN I-F
fan_direction_0_3=M1HFAN II-F

