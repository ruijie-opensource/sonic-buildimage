cpld_type_0_1=LATTICE/LCMXO3LF-4300C-6BG324I
cpld_type_0_2=LATTICE/LCMXO3LF-4300C-6BG324I
cpld_type_0_3=LATTICE/LCMXO3LF-2100C-5BG256C
