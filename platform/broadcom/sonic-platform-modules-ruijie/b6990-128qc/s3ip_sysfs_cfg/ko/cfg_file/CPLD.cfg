cpld_type_0_5=LATTICE/LCMXO3LF-4300C-6BG324I
cpld_type_0_6=LATTICE/LCMXO3LF-4300C-6BG324I
cpld_type_0_7=LATTICE/LCMXO3LF-2100C-5BG324I
cpld_type_0_8=LATTICE/LCMXO3LF-4300C-6BG324I

