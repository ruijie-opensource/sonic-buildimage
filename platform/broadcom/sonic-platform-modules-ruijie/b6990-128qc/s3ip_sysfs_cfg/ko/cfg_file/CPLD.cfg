#
# @填写约定
# 1. 配置项之前必须填写完整注释，配置项同行禁止填写注释，配置项中间禁止添加无效空格
# 2. 配置项值支持10、16进制两种格式数值，16进制以"0x"开始
# 3. 配置项部分成员在特定产品中不需要填写，为方便其他产品拷贝填写，禁止删除
# 4. 配置项

# 配置项：	系统E2 i2c总线地址
# 填写说明：格式 other_i2c_dev.bus_[main_dev]_[minor_dev] other_i2c_dev.addr_[main_dev]_[minor_dev],
#			.bus配置项对应总线号(/dev/i2c-bus)
#			.addr配置项对应设备在总线上的地址
# 备注：	main_dev见rg_main_dev_type_t定义，主板为0, minor_dev为0
other_i2c_dev.bus_0_0=1
other_i2c_dev.addr_0_0=0x56

# 配置项： 系统E2路径
eeprom_path_0_0=/sys/bus/i2c/devices/1-0056/eeprom

# 配置项： 系统E2大小
eeprom_size_0_0=256

# 配置项：	watchdog编号
# 填写说明：格式watchdog_id_[index]
watchdog_id_0=0

# 配置项：	watchdog设备名
# 填写说明：格式watchdog_name_[index]_[type]
watchdog_name_0_0=identity
watchdog_name_0_1=state
watchdog_name_0_2=timeleft

# 配置项：	cpld设备i2c总线地址
# 填写说明：格式cpld_i2c_dev.bus_[cpld_slot]_[cpld_id] cpld_i2c_dev.addr_[cpld_slot]_[cpld_id]
#			各产品上所有cpld编号自定义，不重复即可，编号体现在的cpld设备偏移地址的高八位
#			cpld_slot: 1:线卡1, 2:线卡2, 3:线卡3, 4:线卡4,5:风扇转接板,
#			cpld_id: 0:CPLD_A 1:CPLD_B
#			.bus配置项对应总线号(/dev/i2c-bus)
#			.addr配置项对应设备在总线上的地址
# 备注：	选填，不存在I2C访问的cpld不填写
cpld_i2c_dev.bus_0_2=62
cpld_i2c_dev.addr_0_2=0x3d
cpld_i2c_dev.bus_0_3=103
cpld_i2c_dev.addr_0_3=0x0d
cpld_i2c_dev.bus_0_4=87
cpld_i2c_dev.addr_0_4=0x1d
cpld_i2c_dev.bus_0_5=88
cpld_i2c_dev.addr_0_5=0x2d
cpld_i2c_dev.bus_0_6=89
cpld_i2c_dev.addr_0_6=0x3d
cpld_i2c_dev.bus_0_7=111
cpld_i2c_dev.addr_0_7=0x0d
cpld_i2c_dev.bus_0_8=127
cpld_i2c_dev.addr_0_8=0x3d

# 配置项：	cpld设备lpc地址
# 填写说明：格式cpld_lpc_addr_[cpld_slot]_[cpld_id]
#			各产品上所有cpld编号自定义，不重复即可，编号体现在的cpld设备偏移地址的高八位
#			cpld_id: 0:X86_CPLD, 1:MAC_CPLDA, 2:MAC_CPLDB
# 备注：	选填，不存在lpc访问的cpld不填写
cpld_lpc_dev_0_0=0xa00
cpld_lpc_dev_0_1=0x900

# 配置项： 板卡每片cpld的访问模式(LPC/I2C)
# 填写说明：格式mode_cpld_[cpld_slot][cpld_slot]=lpc/i2c, cpld_id为cpld编号,从0开始
# 备注：	必填
mode_cpld_0_0=lpc
mode_cpld_0_1=lpc
mode_cpld_0_2=i2c
mode_cpld_0_3=i2c
mode_cpld_0_4=i2c
mode_cpld_0_5=i2c
mode_cpld_0_6=i2c
mode_cpld_0_7=i2c
mode_cpld_0_8=i2c

# 配置项：	主板CPLD数量
# 填写说明：格式 dev_num_[main_dev]_[minor_dev]
# 备注：	main_dev: 主板为0, 子卡为5, minor_dev: CPLD为8
dev_num_0_8=9

# 配置项： 每片cpld的名称
# 填写说明：格式 cpld_name_[cpld_id] cpld_id为cpld编号,从1开始
# 备注：	必填
cpld_name_0_0=CPU_CPLD
cpld_name_0_1=BASE_CPLD
cpld_name_0_2=UPORT_CPLD
cpld_name_0_3=UFCB_CPLD
cpld_name_0_4=MAC_CPLDA
cpld_name_0_5=MAC_CPLDB
cpld_name_0_6=MAC_CPLDC
cpld_name_0_7=DFCB_CPLD
cpld_name_0_8=DPORT_CPLD


# 配置项： 每片cpld的型号
# 填写说明：格式 cpld_type_[cpld_id] cpld_id为cpld编号,从1开始
# 备注：	必填
